spring.application.name=aavie-backend
server.port=8080
server.address=0.0.0.0

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/aaviedb?useSSL=false&serverTimezone=Asia/Kolkata&useLegacyDatetimeCode=false&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.generate-ddl=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
server.timezone=Asia/Kolkata
spring.jackson.time-zone=Asia/Kolkata

# Gemini API
gemini.api.key=AIzaSyAIaBLREZRgy5xPqZUw4XFmKzOEKvuDsdI
 # gemini.api.key=${GEMINI_API_KEY:your-fallback-key-here}

# JWT Configuration
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# Rate Limiting
rate.limit.max-requests=100
rate.limit.time-window-minutes=1

#razorpay.key.id=${RAZORPAY_KEY_ID}                     
#razorpay.key.secret=${RAZORPAY_KEY_SECRET}

razorpay.key.id=rzp_test_T2EHwHSM2DEOa6
razorpay.key.secret=I3FPDISe9EGCEfBYyN1WsX0T

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.example.AavieApp=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n


# Increase max upload size
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Increase timeout for slow connections
server.connection-timeout=120s
spring.mvc.async.request-timeout=120000

# Enable debug logging
logging.level.com.example.AavieApp=DEBUG
logging.level.org.springframework.web=DEBUG

# Fast2SMS

fast2sms.api.key=785d45b9-5b31-11f1-8352-0200cd936042
#fast2sms.api.key=${FAST2SMS_API_KEY:your-local-api-key-here}


