spring.application.name=aavie-backend

server.port=${PORT}
server.address=0.0.0.0

# MySQL
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.generate-ddl=true

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

#Time Zones
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
server.timezone=Asia/Kolkata
spring.jackson.time-zone=Asia/Kolkata

# Gemini API
gemini.api.key=${GEMINI_API_KEY}

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Rate Limiting
rate.limit.max-requests=100
rate.limit.time-window-minutes=1

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.example.AavieApp=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n


# Increase max upload size
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Increase timeout for slow connections
server.connection-timeout=120s
spring.mvc.async.request-timeout=120000

# Enable debug logging
logging.level.com.example.AavieApp=DEBUG
logging.level.org.springframework.web=DEBUG

# Fast2SMS
fast2sms.api.key=${FAST2SMS_API_KEY:your-local-api-key-here}

#razorpay.key.id & Secret

razorpay.key.id=${RAZORPAY_KEY_ID}                     
razorpay.key.secret=${RAZORPAY_KEY_SECRET}